'EOF'
name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t asesh561/ci-demo:latest .

      - name: Push Docker Image
        run: docker push asesh561/ci-demo:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull asesh561/ci-demo:latest
            docker stop ci-demo || true
            docker rm ci-demo || true
            docker run -d -p 4000:3000 --name ci-demo asesh561/ci-demo:latest
EOF